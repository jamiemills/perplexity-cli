name: CI

'on':
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Ubuntu / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.12'
            property-profile: push
          - python-version: '3.13'
            property-profile: ci
          - python-version: '3.14'
            property-profile: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --locked

      - name: Run CI pipeline
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
          PROPERTY_PROFILE: ${{ matrix.property-profile }}
        run: make ci

  test-macos:
    name: macOS / Python 3.12
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --all-extras --locked

      - name: Run CI pipeline
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
          PROPERTY_PROFILE: push
        run: make ci
