name: Publish to PyPI

'on':
  push:
    tags:
      - 'v*'

# Required for creating releases and OIDC to PyPI
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate version matches tag and package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG_VERSION#v}"
          echo "Tag version: ${TAG_VERSION}"
          PY_VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version']); f.close()")
          echo "pyproject.toml version: ${PY_VERSION}"
          RUNTIME_VERSION=$(PYTHONPATH=src python -c "from perplexity_cli import __version__; print(__version__)")
          echo "runtime version: ${RUNTIME_VERSION}"
          if [ "${TAG_VERSION}" != "${PY_VERSION}" ] || [ "${TAG_VERSION}" != "${RUNTIME_VERSION}" ]; then
            echo "Error: Tag version (${TAG_VERSION}) must match pyproject (${PY_VERSION}) and runtime (${RUNTIME_VERSION})."
            exit 1
          fi

      - name: Sync dependencies
        run: |
          uv sync --all-extras --locked

      - name: Check formatting
        run: |
          uv run ruff format --check src tests

      - name: Check linting
        run: |
          uv run ruff check src tests

      - name: Check typing
        run: |
          uv run ty check src

      - name: Run tests
        run: |
          uv run pytest --cov=perplexity_cli --cov-report=term-missing --cov-fail-under=40

      - name: Build distributions
        run: |
          rm -rf dist
          uv build

      - name: Verify distributions
        run: |
          ls -lh dist/
          uvx twine check dist/*
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = sorted(Path("dist").glob("pxcli-*.whl"))
          if not wheels:
              raise SystemExit("No built wheel found in dist/.")

          with ZipFile(wheels[-1]) as wheel:
              names = set(wheel.namelist())

          required = "perplexity_cli/config/urls.json"
          if required not in names:
              raise SystemExit(f"Missing required packaged resource: {required}")

          print(f"Verified required packaged resource: {required}")
          PY

      - name: Run installed-package smoke test
        run: |
          sh .claude/scripts/installed_smoke_test.sh

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: dist/*
