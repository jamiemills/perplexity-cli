name: Publish to PyPI

'on':
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for creating releases and OIDC to PyPI
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate version matches tag and package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG_VERSION#v}"
          echo "Tag version: ${TAG_VERSION}"
          PY_VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version']); f.close()")
          echo "pyproject.toml version: ${PY_VERSION}"
          RUNTIME_VERSION=$(PYTHONPATH=src python -c "from perplexity_cli import __version__; print(__version__)")
          echo "runtime version: ${RUNTIME_VERSION}"
          if [ "${TAG_VERSION}" != "${PY_VERSION}" ] || [ "${TAG_VERSION}" != "${RUNTIME_VERSION}" ]; then
            echo "Error: Tag version (${TAG_VERSION}) must match pyproject (${PY_VERSION}) and runtime (${RUNTIME_VERSION})."
            exit 1
          fi

      - name: Sync dependencies
        run: uv sync --all-extras --locked

      - name: Run CI pipeline
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: make ci

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: dist/*
