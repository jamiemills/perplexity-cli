# =============================================================================
# Pre-commit: 3-stage pipeline (piped = sequential stages, abort on failure)
#
#   Stage 1  Read-only linters & validators  (parallel, ~4s)
#   Stage 2  Auto-fixers                     (piped,    ~0.7s)
#   Stage 3  Unit tests (no coverage)        (single,   ~21s)
#
# Check commands are defined in the Makefile (single source of truth).
# Staged-file auto-fixers remain here as they need git-specific behaviour.
#
# Fail-fast: a pyright or bandit error aborts in ~2-4s instead of ~24s.
# Coverage enforcement, supply-chain scanning, and fuzz testing run on
# pre-push where per-commit granularity is not needed.
# =============================================================================

pre-commit:
  piped: true
  jobs:
    # -----------------------------------------------------------------
    # Stage 1: read-only linters and validators (parallel)
    #
    # None of these modify files. Running them first gives the fastest
    # possible feedback on real errors that no fixer can address.
    # Commands delegate to Makefile targets for consistency with CI.
    # Wall time: ~4s (semgrep is the bottleneck).
    # -----------------------------------------------------------------
    - name: lint-and-validate
      group:
        parallel: true
        jobs:
          - name: pyright-check
            glob: "*.py"
            run: make typecheck-pyright

          - name: ty-check
            glob: "*.py"
            run: make typecheck

          - name: bandit
            glob: "*.py"
            run: make bandit

          - name: vulture
            glob: "*.py"
            run: make vulture

          - name: radon-cc
            glob: "*.py"
            run: make complexity-cc

          - name: radon-mi
            glob: "*.py"
            run: make complexity-mi

          - name: semgrep
            glob: "*.py"
            run: make semgrep

          - name: check-yaml
            glob: "*.yml|*.yaml"
            run: uvx --from pre-commit-hooks check-yaml {staged_files}

          - name: check-json
            glob: "*.json"
            run: uvx --from pre-commit-hooks check-json {staged_files}

          - name: check-toml
            glob: "*.toml"
            run: uvx --from pre-commit-hooks check-toml {staged_files}

          - name: check-added-large-files
            run: uvx --from pre-commit-hooks check-added-large-files --maxkb=1000 {staged_files}

          - name: check-merge-conflict
            run: uvx --from pre-commit-hooks check-merge-conflict {staged_files}

          - name: check-case-conflict
            run: uvx --from pre-commit-hooks check-case-conflict {staged_files}

          - name: check-docstring-first
            glob: "*.py"
            run: uvx --from pre-commit-hooks check-docstring-first {staged_files}

          - name: name-tests-test
            glob: "tests/**/*.py"
            run: uvx --from pre-commit-hooks name-tests-test --pytest-test-first {staged_files}

    # -----------------------------------------------------------------
    # Stage 2: auto-fixers (piped -- sequential to avoid file races)
    #
    # These modify staged files and re-stage the result.  This is
    # git-specific behaviour that cannot be expressed in the Makefile,
    # so commands remain inline here.
    # Wall time: ~0.7s sequential.
    # -----------------------------------------------------------------
    - name: fix-formatting
      group:
        piped: true
        jobs:
          - name: ruff-format
            glob: "*.py"
            run: uv run ruff format {staged_files}
            stage_fixed: true

          - name: ruff-check
            glob: "*.py"
            run: uv run ruff check --fix {staged_files}
            stage_fixed: true

          - name: trailing-whitespace
            run: uvx --from pre-commit-hooks trailing-whitespace-fixer {staged_files}
            stage_fixed: true

          - name: end-of-file-fixer
            run: uvx --from pre-commit-hooks end-of-file-fixer {staged_files}
            stage_fixed: true

    # -----------------------------------------------------------------
    # Stage 3: unit tests without coverage (fail-fast)
    #
    # Runs only when stages 1 and 2 pass. Coverage enforcement is
    # deferred to pre-push to keep commits fast.
    # Wall time: ~21s.
    # -----------------------------------------------------------------
    - name: pytest-check
      run: make test

# =============================================================================
# Pre-push: expensive whole-project validations (parallel)
#
# Full test suite with coverage enforcement, supply-chain scanning, and
# fuzz testing. These do not need per-commit granularity.
# Wall time: ~24s (pytest+coverage is the bottleneck).
# =============================================================================

pre-push:
  parallel: true
  jobs:
    - name: pytest-coverage
      run: make test-coverage

    - name: safety-scan
      run: make safety

    - name: fuzz-check
      run: make test-fuzz

    - name: generate-sonar-reports
      run: make sonar-reports
