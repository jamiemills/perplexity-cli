# =============================================================================
# quality/gates.conf — locked quality gate thresholds and check toggles.
#
# This file is DENIED to coding agents via opencode.jsonc.  Values here
# set the floor for all quality analysers.  Agents may tighten thresholds
# in the Makefile but may not loosen them below these floors.
#
# To change these values as a human: edit opencode.jsonc to temporarily
# remove the deny rule, update this file, and restore the rule.
# =============================================================================

# ---------------------------------------------------------------------------
# Quantitative thresholds
# ---------------------------------------------------------------------------

# Coupling: max allowed flagged modules (higher = looser gate)
MAX_FLAGGED = 10

# Coupling: Martin distance-from-main-sequence flagging threshold
DISTANCE_THRESHOLD = 0.3

# Coverage: minimum module coverage percentage (lower = looser gate)
MIN_COVERAGE = 85

# Coverage: pyproject.toml [tool.coverage.report] fail_under
FAIL_UNDER = 85

# Vulture: minimum confidence score for dead-code reporting (lower = looser)
MIN_CONFIDENCE = 80

# Radon: worst-allowed cyclomatic-complexity grade (A=best, F=worst)
RADON_CC_GRADE = B

# Radon: worst-allowed maintainability-index grade
RADON_MI_GRADE = B

# File-size: max source lines per file before ratchet fails
FILE_SIZE_CAP = 1000

# Semgrep: minimum severity levels scanned
SEMGREP_SEVERITY = ERROR WARNING

# ---------------------------------------------------------------------------
# Check toggles — controls which analysers run in `make check`
# ---------------------------------------------------------------------------

CHECK_FORMAT = true
CHECK_LINT = true
CHECK_TYPECHECK_ALL = true
CHECK_SECURITY = true
CHECK_COMPLEXITY = true
CHECK_SEMGREP = true
CHECK_ARCH = true
CHECK_COUPLING = true
CHECK_RATCHETS = true
